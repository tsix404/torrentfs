name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Push to main → dev tag
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            # Git tag v* → semver tags (type=semver auto-enables only for semver refs)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Git tag v* → latest tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Config Test (TSI-1949, scenario 10) ─────────────────────────────────
  # Validates the --config parameter end-to-end in a Docker container.
  # Independent of build-and-push — builds its own dedicated test image.
  config-test:
    runs-on: ubuntu-latest
    continue-on-error: true  # FUSE may not be available in all CI runners
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build config test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.config-test
          platforms: linux/amd64
          push: false
          load: true
          tags: torrentfs:config-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run config test container
        run: |
          echo "=== Running --config parameter test (scenario 10) ==="
          # Load FUSE kernel module if available
          if [ -e /dev/fuse ]; then
            echo "FUSE device available"
          else
            echo "FUSE device not available — skipping mount test"
          fi
          # Run the config test container with FUSE capabilities
          docker run --rm \
            --cap-add SYS_ADMIN \
            --device /dev/fuse \
            torrentfs:config-test
