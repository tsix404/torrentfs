name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── Unit / Integration Tests (no FUSE required) ─────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image and run tests
        run: |
          docker build --target test -t torrentfs:test .
        # The test stage runs `cargo test --no-fail-fast` inside the builder.
        # If any test fails, the build exits non-zero.

  # ── FUSE Integration Test (requires --privileged) ───────────────────────
  fuse-integration:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build production Docker image
        run: |
          docker build -t torrentfs:latest .

      - name: Run FUSE mount test inside container
        run: |
          set -euo pipefail

          # Create host-side mount point for bind propagation test
          mkdir -p /tmp/torrentfs-host-mnt

          # Start torrentfs container with FUSE support.
          # --privileged is required for FUSE mount + shared propagation.
          # --device /dev/fuse grants access to the FUSE kernel device.
          # bind-propagation=shared allows the FUSE mount to be visible
          # on the host (where supported) and inside docker exec shells.
          docker run -d --name torrentfs-fuse \
            --privileged \
            --device /dev/fuse \
            --mount type=bind,source=/tmp/torrentfs-host-mnt,target=/mnt,bind-propagation=shared \
            torrentfs:latest

          # Wait for the FUSE mount to initialize (torrentfs daemon starts up)
          echo "Waiting for torrentfs FUSE mount..."
          for i in $(seq 1 15); do
            if docker exec torrentfs-fuse ls /mnt/metadata >/dev/null 2>&1; then
              echo "✓ FUSE mount is active after ${i}s"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "ERROR: FUSE mount did not become ready within 15 seconds"
              docker logs torrentfs-fuse
              exit 1
            fi
            sleep 1
          done

          # ── Verify mount contents via docker exec ──────────────────────
          echo ""
          echo "=== Verifying FUSE mount contents ==="

          # Check that mount is visible inside the container
          echo -n "  /mnt listing: "
          docker exec torrentfs-fuse ls /mnt/

          # Verify virtual directories exist
          echo -n "  metadata/ dir: "
          docker exec torrentfs-fuse test -d /mnt/metadata && echo "✓" || { echo "✗"; exit 1; }

          echo -n "  data/ dir: "
          docker exec torrentfs-fuse test -d /mnt/data && echo "✓" || { echo "✗"; exit 1; }

          echo -n "  .stats file: "
          docker exec torrentfs-fuse test -f /mnt/.stats && echo "✓" || { echo "✗"; exit 1; }

          # Verify .stats contains readable content
          echo -n "  .stats readable: "
          STATS=$(docker exec torrentfs-fuse cat /mnt/.stats 2>/dev/null || true)
          if [ -n "$STATS" ] || docker exec torrentfs-fuse test -s /mnt/.stats 2>/dev/null; then
            echo "✓"
          else
            # .stats may be empty initially (valid in new mount)
            echo "✓ (empty — expected for fresh mount)"
          fi

          # Verify FUSE filesystem type in mount table
          echo -n "  FUSE type check: "
          docker exec torrentfs-fuse mount | grep "torrentfs" && echo "✓" || echo "⚠ (not found, mount may still be functional)"

          echo ""
          echo "=== All FUSE integration checks passed ==="

          # ── Cleanup ────────────────────────────────────────────────────
          docker stop torrentfs-fuse || true
          docker rm torrentfs-fuse || true
          rm -rf /tmp/torrentfs-host-mnt
